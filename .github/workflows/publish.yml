name: Publish Packages to NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: npm
    env:
      GIT_AUTHOR_NAME: "Soumadip Das"
      GIT_COMMITTER_NAME: "Soumadip Das"
      GIT_AUTHOR_EMAIL: "CI@portosaur.org"
      GIT_COMMITTER_EMAIL: "CI@portosaur.org"

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |-
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish all workspaces
        run: |-
          # publish loop for scoped packages
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              pkg_name=$(jq -r .name "$dir/package.json")
              pkg_version=$(jq -r .version "$dir/package.json")
              
              echo "Checking $pkg_name@$pkg_version..."
              
              # Check if version exists on npm
              if npm view "$pkg_name@$pkg_version" > /dev/null 2>&1; then
                echo "✓ $pkg_name@$pkg_version already published"
              else
                echo "Publishing $pkg_name@$pkg_version..."
                
                cd $dir
                bun publish --access public
                
                if [ $? -ne 0 ]; then
                  echo "✗ Failed to publish $pkg_name@$pkg_version"
                  exit 1
                fi
                
                cd ../..
              fi
            fi
          done
