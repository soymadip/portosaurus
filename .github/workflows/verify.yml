name: Code Quality and Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BAKE_CACHE_DIR: ~/.bun/install/cache
  DOCS_CACHE_DIR: packages/docs/.vitepress/cache

jobs:
  verify:
    name: Lint, Test, Build, and Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BAKE_CACHE_DIR }}
            ${{ env.DOCS_CACHE_DIR }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint check
        run: bun run lint

      - name: Run tests
        run: bun run test:all

      - name: Build all packages
        run: bun run build:all

      - name: Configure Git
        run: |
          git config --global user.email "ci@portosaur.org"
          git config --global user.name "Portosaur CI"

      - name: Smoke Test - Initialize Project
        run: bun run packages/cli/bin/porto.mjs init smoke-test-site
        continue-on-error: false

      - name: Verify Project Structure
        run: |
          if [ ! -d "smoke-test-site" ]; then
            echo "❌ Error: Project directory was not created"
            exit 1
          fi
          echo "✅ Project directory created successfully"

      - name: Smoke Test - Build Project
        run: |
          cd smoke-test-site
          bun run build
