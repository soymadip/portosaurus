[tools]
uv = "latest"
"pipx:commitizen" = "latest"
bun = "latest"

[env]
_.path = './bin'
CZ_CONFIG = 'src/cz/cz.yaml'

[shell_alias]
cz = "cz "

[tasks]
bump = "cz --config $CZ_CONFIG  bump"
commit = "cz --config $CZ_CONFIG commit"
changelog = "cz --config $CZ_CONFIG changelog"
pr = "gh pr create"
